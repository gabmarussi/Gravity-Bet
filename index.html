<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Bet | Cassino Virtual Minimalista</title>
    <meta name="description" content="Aposte no Gravity Bet, o simulador de cassino virtual mais elegante e futurista. Gerencie seu saldo e tente a sorte!">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Gravity Bet</div>
        <div class="balance-card">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#00e5ff"/>
            </svg>
            <span>Saldo: <span id="balance-amount">1.000,00</span></span>
        </div>
    </header>

    <main>
        <section class="bet-container">
            <div class="input-group">
                <label for="bet-amount">Valor da Aposta</label>
                <input type="number" id="bet-amount" placeholder="0.00" min="1" step="0.01">
            </div>

            <div class="action-grid">
                <button class="btn-even" onclick="placeBet('EVEN')">Par (2x)</button>
                <button class="btn-odd" onclick="placeBet('ODD')">Ímpar (2x)</button>
                <button class="btn-red" onclick="placeBet('RED')">Vermelho (2x)</button>
                <button class="btn-black" onclick="placeBet('BLACK')">Preto (2x)</button>
            </div>
        </section>

        <section id="event-console" class="console-log">
            <div class="log-entry">Bem-vindo ao Gravity Bet. Boa sorte!</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Gravity Bet - Desenvolvido para entusiastas de lógica. | <a href="#">Ver Repositório</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
